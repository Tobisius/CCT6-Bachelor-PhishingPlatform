<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup page</title>
</head>
<div class="login-container">
        <h2><em>Login</em></h2>
        <form id="loginForm">
            {% csrf_token %}

            <label for="name"><em>Name</em></label>
            <input type="text" id="name" name="name" required>

            <label for="email"><em>Email</em></label>
            <input type="email" id="email" name="email" required>
            
            <label for="password"><em>Password</em></label>
            <input type="password" id="password" name="password" required>

            <lable for="company"><em>Company</em></lable>
            <input type="text" id="company" name="company" required>

            <lable for="isAdmin"><em>Is Admin?</em></lable>
            <input type="checkbox" id="isAdmin" name="isAdmin">
            
            <button type="button" onclick="createUser()"><em>LOGIN</em></button>
            <br>
            <!-- Skift /signup til det rigtige link -->
        </form>
    </div>

<script src = "https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<script>

        function sanitize(string) {
            /*
            Sanitizes the input for javaScript
            */
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#x27;',
                "/": '&#x2F;',
            };
            const reg = /[&<>"'/]/ig;
            return string.replace(reg, (match)=>(map[match]));
          }

async function createUser() {
            // Get the values, entered by the user. 
            
            try {
                const email = sanitize(document.getElementById('email').value);
                const password = sanitize(document.getElementById('password').value);
                const name = sanitize(document.getElementById('name').value);
                const company = sanitize(document.getElementById('company').value);
                const isAdmin = document.getElementById('isAdmin').checked;

                if (!email || !password || !name) {
                    alert("All fields are required.");
                    return;
                }
            
                // Hash the email and password, using SHA512. This is compared to the already stored version of the hashed password, 
                // which was appended when the user created the account, in the backend.
                const hashedPassword = CryptoJS.SHA512(password).toString();
                
                //Send the data to the backend to be compared
                const formData = new FormData();
                formData.append('email', email);
                formData.append('password', hashedPassword);
                formData.append('name', name);
                formData.append('company', company);
                formData.append('isAdmin', isAdmin);
                const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

                fetch("{% url 'signup:goToDashboard' %}", {
                    method: "POST",
                    headers: {
                        'X-CSRFToken': csrfToken
                    },
                    body: formData
                })
                .then(response => {
                    if (response.redirected) {
                        // Follow the backend redirect target (e.g. dashboard)
                        window.location.href = response.url;
                    } else if (!response.ok) {
                        // Handle errors (e.g., invalid 2FA code)
                        return response.text().then(text => {
                            alert(`Error : ${text}`);
                        });
                    }
                })
                .catch(error => {
                    console.error('Error creating user:', error);
                    alert('An error occurred while creating the user. Please try again.');
                });



            } catch (error) {
                alert("An unexpected error occurred. Please try again.");
            }
        }

</script>
