<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>

    <h1>Login</h1>

    <form id="loginForm" method="post">
        {% csrf_token %}

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <button type="submit">Login</button>
    </form>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
        function sanitize(string) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#x27;',
                "/": '&#x2F;',
            };
            const reg = /[&<>"'/]/ig;
            return string.replace(reg, (match) => map[match]);
        }

        document.getElementById("loginForm").addEventListener("submit", async function (event) {
            event.preventDefault();

            try {
                const email = sanitize(document.getElementById("email").value);
                const password = document.getElementById("password").value;
                const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
                
                // Hash the password, using SHA512. This is compared to the already stored version of the hashed password, 
                // which was appended when the user created the account, in the backend.
                const hashedPassword = CryptoJS.SHA512(password).toString();

                // Basic validation to ensure fields are not empty
                if (!email || !password) {
                    alert("All fields are required.");
                    return;
                }

                // Create a FormData object to send the email and hashed password to the server
                const formData = new FormData();
                formData.append("email", email);
                formData.append("password", hashedPassword);
                
                const response = await fetch("{% url 'login:index' %}", {
                    method: "POST",
                    headers: {
                        "X-CSRFToken": csrfToken
                    },
                    body: formData
                });

                if (response.redirected) {
                    window.location.href = response.url;
                } else if (!response.ok) {
                    const text = await response.text();
                    alert(`Error: ${text}`);
                }
            } catch (error) {
                console.error("Error logging in:", error);
                alert("An unexpected error occurred. Please try again.");
            }
        });
    </script>
</body>
</html>
